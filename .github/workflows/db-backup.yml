name: Neon DB Backup

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PostgreSQL 17 client
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y wget ca-certificates
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo wget --quiet -O /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc https://www.postgresql.org/media/keys/ACCC4CF8.asc
          . /etc/os-release
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] http://apt.postgresql.org/pub/repos/apt ${VERSION_CODENAME}-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          pg_dump --version

      - name: Create SQL backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail
          if [ -z "${DATABASE_URL}" ]; then
            echo "DATABASE_URL secret is not set"
            exit 1
          fi

          mkdir -p backups
          BACKUP_FILE="backups/backup_$(date +%Y%m%d).sql"
          pg_dump "${DATABASE_URL}" > "${BACKUP_FILE}"
          echo "BACKUP_FILE=${BACKUP_FILE}" >> "$GITHUB_ENV"

      - name: Commit and push if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add backups/

          if git diff --cached --quiet; then
            echo "No backup changes to commit."
            exit 0
          fi

          git commit -m "chore: DB backup $(date +%Y-%m-%d)"
          git push